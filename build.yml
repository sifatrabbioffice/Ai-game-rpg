name: iOS RPG Game — Build & Sideload IPA

on:
  push:
    branches: [ main, develop ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SCHEME:        RPGGame
  PROJECT:       RPGGame.xcodeproj
  BUNDLE_ID:     com.yourcompany.rpggame
  IOS_TARGET:    "15.0"
  XCODE_VER:     "15.3"
  DERIVED_DATA:  ${{ github.workspace }}/DerivedData
  ARCHIVE_PATH:  ${{ github.workspace }}/DerivedData/RPGGame.xcarchive
  SIDELOAD_IPA:  ${{ github.workspace }}/output/RPGGame-sideload.ipa

# ─────────────────────────────────────────────────────────────
jobs:

# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 1 — setup-project                                   ║
# ║  xcodeproj repo-তে না থাকলে CI-তেই generate করো         ║
# ╚═══════════════════════════════════════════════════════════╝
  setup-project:
    name: Generate xcodeproj (if missing)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VER }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VER }}.app/Contents/Developer

      # ── Swift ফাইলগুলো সঠিক জায়গায় আছে কিনা নিশ্চিত করো ──
      - name: Verify Swift source files
        run: |
          echo "=== Source files ==="
          for f in RPGGame/AppDelegate.swift RPGGame/ContentView.swift RPGGame/RPGGame.swift RPGGame/Info.plist; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f — missing!"; exit 1
            fi
          done

      # ── xcodeproj আছে কিনা দেখো; না থাকলে generate করো ──
      - name: Generate RPGGame.xcodeproj
        run: |
          if [ -f "RPGGame.xcodeproj/project.pbxproj" ]; then
            echo "✅  RPGGame.xcodeproj already exists — skip"
            exit 0
          fi

          echo "⚙️  RPGGame.xcodeproj missing — generating..."
          mkdir -p RPGGame.xcodeproj

          # ── project.pbxproj inline heredoc ──────────────────
          cat > RPGGame.xcodeproj/project.pbxproj << 'PBXEOF'
// !$*UTF8*$!
{
	archiveVersion = 1;
	classes = {
	};
	objectVersion = 56;
	objects = {

/* Begin PBXBuildFile section */
		AA0000000000000000000014 /* AppDelegate.swift in Sources */ = {isa = PBXBuildFile; fileRef = AA0000000000000000000010; };
		AA0000000000000000000015 /* ContentView.swift in Sources */  = {isa = PBXBuildFile; fileRef = AA0000000000000000000011; };
		AA0000000000000000000016 /* RPGGame.swift in Sources */      = {isa = PBXBuildFile; fileRef = AA0000000000000000000012; };
/* End PBXBuildFile section */

/* Begin PBXFileReference section */
		AA000000000000000000000F /* RPGGame.app */      = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = RPGGame.app; sourceTree = BUILT_PRODUCTS_DIR; };
		AA0000000000000000000010 /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = AppDelegate.swift; sourceTree = "<group>"; };
		AA0000000000000000000011 /* ContentView.swift */  = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ContentView.swift;  sourceTree = "<group>"; };
		AA0000000000000000000012 /* RPGGame.swift */      = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = RPGGame.swift;      sourceTree = "<group>"; };
		AA0000000000000000000013 /* Info.plist */         = {isa = PBXFileReference; lastKnownFileType = text.plist.xml;   path = Info.plist;         sourceTree = "<group>"; };
/* End PBXFileReference section */

/* Begin PBXFrameworksBuildPhase section */
		AA00000000000000000000E0 /* Frameworks */ = {
			isa = PBXFrameworksBuildPhase;
			buildActionMask = 2147483647;
			files = ();
			runOnlyForDeploymentPostprocessing = 0;
		};
/* End PBXFrameworksBuildPhase section */

/* Begin PBXGroup section */
		AA0000000000000000000002 = {
			isa = PBXGroup;
			children = (
				AA0000000000000000000003 /* RPGGame */,
				AA0000000000000000000004 /* Products */,
			);
			sourceTree = "<group>";
		};
		AA0000000000000000000003 /* RPGGame */ = {
			isa = PBXGroup;
			children = (
				AA0000000000000000000010 /* AppDelegate.swift */,
				AA0000000000000000000011 /* ContentView.swift */,
				AA0000000000000000000012 /* RPGGame.swift */,
				AA0000000000000000000013 /* Info.plist */,
			);
			path = RPGGame;
			sourceTree = "<group>";
		};
		AA0000000000000000000004 /* Products */ = {
			isa = PBXGroup;
			children = (
				AA000000000000000000000F /* RPGGame.app */,
			);
			name = Products;
			sourceTree = "<group>";
		};
/* End PBXGroup section */

/* Begin PBXNativeTarget section */
		AA0000000000000000000005 /* RPGGame */ = {
			isa = PBXNativeTarget;
			buildConfigurationList = AA0000000000000000000007;
			buildPhases = (
				AA00000000000000000000C0 /* Sources */,
				AA00000000000000000000E0 /* Frameworks */,
				AA00000000000000000000D0 /* Resources */,
			);
			buildRules = ();
			dependencies = ();
			name = RPGGame;
			productName = RPGGame;
			productReference = AA000000000000000000000F /* RPGGame.app */;
			productType = "com.apple.product-type.application";
		};
/* End PBXNativeTarget section */

/* Begin PBXProject section */
		AA0000000000000000000001 /* Project object */ = {
			isa = PBXProject;
			attributes = {
				BuildIndependentTargetsInParallel = 1;
				LastSwiftUpdateCheck = 1500;
				LastUpgradeCheck = 1500;
				TargetAttributes = {
					AA0000000000000000000005 = { CreatedOnToolsVersion = 15.0; };
				};
			};
			buildConfigurationList = AA0000000000000000000006;
			compatibilityVersion = "Xcode 14.0";
			developmentRegion = en;
			hasScannedForEncodings = 0;
			knownRegions = (en, Base);
			mainGroup = AA0000000000000000000002;
			productRefGroup = AA0000000000000000000004 /* Products */;
			projectDirPath = "";
			projectRoot = "";
			targets = (
				AA0000000000000000000005 /* RPGGame */,
			);
		};
/* End PBXProject section */

/* Begin PBXResourcesBuildPhase section */
		AA00000000000000000000D0 /* Resources */ = {
			isa = PBXResourcesBuildPhase;
			buildActionMask = 2147483647;
			files = ();
			runOnlyForDeploymentPostprocessing = 0;
		};
/* End PBXResourcesBuildPhase section */

/* Begin PBXSourcesBuildPhase section */
		AA00000000000000000000C0 /* Sources */ = {
			isa = PBXSourcesBuildPhase;
			buildActionMask = 2147483647;
			files = (
				AA0000000000000000000014 /* AppDelegate.swift in Sources */,
				AA0000000000000000000015 /* ContentView.swift in Sources */,
				AA0000000000000000000016 /* RPGGame.swift in Sources */,
			);
			runOnlyForDeploymentPostprocessing = 0;
		};
/* End PBXSourcesBuildPhase section */

/* Begin XCBuildConfiguration section */
		AA0000000000000000000008 /* Debug */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				ALWAYS_SEARCH_USER_PATHS = NO;
				CLANG_ENABLE_MODULES = YES;
				CLANG_ENABLE_OBJC_ARC = YES;
				COPY_PHASE_STRIP = NO;
				DEBUG_INFORMATION_FORMAT = dwarf;
				ENABLE_TESTABILITY = YES;
				GCC_DYNAMIC_NO_PIC = NO;
				GCC_OPTIMIZATION_LEVEL = 0;
				GCC_PREPROCESSOR_DEFINITIONS = ("DEBUG=1", "$(inherited)");
				GCC_WARN_ABOUT_RETURN_TYPE = YES_ERROR;
				GCC_WARN_UNUSED_VARIABLE = YES;
				IPHONEOS_DEPLOYMENT_TARGET = 15.0;
				ONLY_ACTIVE_ARCH = YES;
				SDKROOT = iphoneos;
				SWIFT_ACTIVE_COMPILATION_CONDITIONS = "DEBUG $(inherited)";
				SWIFT_OPTIMIZATION_LEVEL = "-Onone";
			};
			name = Debug;
		};
		AA0000000000000000000009 /* Release */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				ALWAYS_SEARCH_USER_PATHS = NO;
				CLANG_ENABLE_MODULES = YES;
				CLANG_ENABLE_OBJC_ARC = YES;
				COPY_PHASE_STRIP = NO;
				DEBUG_INFORMATION_FORMAT = "dwarf-with-dsym";
				ENABLE_NS_ASSERTIONS = NO;
				GCC_WARN_ABOUT_RETURN_TYPE = YES_ERROR;
				GCC_WARN_UNUSED_VARIABLE = YES;
				IPHONEOS_DEPLOYMENT_TARGET = 15.0;
				SDKROOT = iphoneos;
				SWIFT_COMPILATION_MODE = wholemodule;
				SWIFT_OPTIMIZATION_LEVEL = "-O";
				VALIDATE_PRODUCT = YES;
			};
			name = Release;
		};
		AA00000000000000000000A0 /* Debug */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				CODE_SIGN_IDENTITY = "";
				CODE_SIGN_STYLE = Manual;
				CODE_SIGNING_REQUIRED = NO;
				CODE_SIGNING_ALLOWED = NO;
				CURRENT_PROJECT_VERSION = 1;
				GENERATE_INFOPLIST_FILE = NO;
				INFOPLIST_FILE = RPGGame/Info.plist;
				IPHONEOS_DEPLOYMENT_TARGET = 15.0;
				LD_RUNPATH_SEARCH_PATHS = ("$(inherited)", "@executable_path/Frameworks");
				MARKETING_VERSION = 1.0;
				PRODUCT_BUNDLE_IDENTIFIER = com.yourcompany.rpggame;
				PRODUCT_NAME = "$(TARGET_NAME)";
				SWIFT_EMIT_LOC_STRINGS = YES;
				SWIFT_VERSION = 5.0;
				TARGETED_DEVICE_FAMILY = "1,2";
			};
			name = Debug;
		};
		AA00000000000000000000B0 /* Release */ = {
			isa = XCBuildConfiguration;
			buildSettings = {
				CODE_SIGN_IDENTITY = "";
				CODE_SIGN_STYLE = Manual;
				CODE_SIGNING_REQUIRED = NO;
				CODE_SIGNING_ALLOWED = NO;
				CURRENT_PROJECT_VERSION = 1;
				GENERATE_INFOPLIST_FILE = NO;
				INFOPLIST_FILE = RPGGame/Info.plist;
				IPHONEOS_DEPLOYMENT_TARGET = 15.0;
				LD_RUNPATH_SEARCH_PATHS = ("$(inherited)", "@executable_path/Frameworks");
				MARKETING_VERSION = 1.0;
				PRODUCT_BUNDLE_IDENTIFIER = com.yourcompany.rpggame;
				PRODUCT_NAME = "$(TARGET_NAME)";
				SWIFT_EMIT_LOC_STRINGS = YES;
				SWIFT_VERSION = 5.0;
				TARGETED_DEVICE_FAMILY = "1,2";
			};
			name = Release;
		};
/* End XCBuildConfiguration section */

/* Begin XCConfigurationList section */
		AA0000000000000000000006 = {
			isa = XCConfigurationList;
			buildConfigurations = (
				AA0000000000000000000008 /* Debug */,
				AA0000000000000000000009 /* Release */,
			);
			defaultConfigurationIsVisible = 0;
			defaultConfigurationName = Release;
		};
		AA0000000000000000000007 = {
			isa = XCConfigurationList;
			buildConfigurations = (
				AA00000000000000000000A0 /* Debug */,
				AA00000000000000000000B0 /* Release */,
			);
			defaultConfigurationIsVisible = 0;
			defaultConfigurationName = Release;
		};
/* End XCConfigurationList section */
	};
	rootObject = AA0000000000000000000001 /* Project object */;
}
PBXEOF

          echo "✅  RPGGame.xcodeproj/project.pbxproj generated"
          plutil -lint RPGGame.xcodeproj/project.pbxproj && echo "✅  project.pbxproj syntax OK"

      # ── xcodeproj artifact হিসেবে save করো (পরের job-এ দরকার) ──
      - name: Upload xcodeproj artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcodeproj
          path: RPGGame.xcodeproj/
          retention-days: 1


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 2 — validate                                        ║
# ╚═══════════════════════════════════════════════════════════╝
  validate:
    name: Validate Project
    runs-on: macos-14
    needs: setup-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download xcodeproj
        uses: actions/download-artifact@v4
        with:
          name: xcodeproj
          path: RPGGame.xcodeproj/

      - name: Select Xcode ${{ env.XCODE_VER }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VER }}.app/Contents/Developer

      - name: Validate all required files
        run: |
          required=(
            "RPGGame.xcodeproj/project.pbxproj"
            "RPGGame/AppDelegate.swift"
            "RPGGame/ContentView.swift"
            "RPGGame/RPGGame.swift"
            "RPGGame/Info.plist"
            "ExportOptions.plist"
            "build.sh"
          )
          all_ok=true
          for f in "${required[@]}"; do
            [ -f "$f" ] && echo "  ✅  $f" || { echo "  ❌  $f"; all_ok=false; }
          done
          $all_ok || exit 1

      - name: Validate plists
        run: |
          plutil -lint RPGGame/Info.plist
          plutil -lint ExportOptions.plist
          plutil -lint RPGGame.xcodeproj/project.pbxproj
          echo "✅  All plists valid"

      - name: Check single @main entry point
        run: |
          count=$(grep -rl "@main" RPGGame/ | wc -l | tr -d ' ')
          echo "@main found in $count file(s)"
          [ "$count" -eq 1 ] || { echo "❌  @main must appear in exactly 1 file"; exit 1; }

      - name: Show project info
        run: |
          xcodebuild -project RPGGame.xcodeproj -list


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 3 — build                                           ║
# ║  Debug → Release → Archive → IPA                         ║
# ╚═══════════════════════════════════════════════════════════╝
  build:
    name: Build & Package IPA
    runs-on: macos-14
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download xcodeproj
        uses: actions/download-artifact@v4
        with:
          name: xcodeproj
          path: RPGGame.xcodeproj/

      - name: Select Xcode ${{ env.XCODE_VER }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VER }}.app/Contents/Developer

      - name: Create output dirs
        run: mkdir -p output DerivedData

      # ── Debug build ────────────────────────────────────────
      - name: Build — Debug
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=$IOS_TARGET \
            build | xcpretty || xcodebuild \
              -project "$PROJECT" -scheme "$SCHEME" \
              -configuration Debug -sdk iphoneos \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      # ── Release build ──────────────────────────────────────
      - name: Build — Release
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=$IOS_TARGET \
            build | xcpretty || true

      # ── Archive ────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      # ── IPA packaging (signing ছাড়া, sideload-এর জন্য) ───
      - name: Package unsigned sideload IPA
        run: |
          # Archive থেকে .app খোঁজো
          APP=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" 2>/dev/null | head -1)

          # না পেলে DerivedData থেকে খোঁজো
          if [ -z "$APP" ]; then
            APP=$(find "$DERIVED_DATA" -path "*/Release-iphoneos/*.app" 2>/dev/null | head -1)
          fi

          if [ -z "$APP" ]; then
            echo "❌  .app bundle not found"; exit 1
          fi

          echo "✅  Found: $APP"
          PAYLOAD="$DERIVED_DATA/Payload"
          rm -rf "$PAYLOAD" && mkdir "$PAYLOAD"
          cp -r "$APP" "$PAYLOAD/"

          cd "$DERIVED_DATA"
          zip -r -q "$SIDELOAD_IPA" Payload/
          echo "✅  IPA: $SIDELOAD_IPA  ($(du -h "$SIDELOAD_IPA" | cut -f1))"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RPGGame-sideload-ipa
          path: ${{ env.SIDELOAD_IPA }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: RPGGame-xcarchive
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 14
          if-no-files-found: warn

      - name: Show build log on failure
        if: failure()
        run: find "$DERIVED_DATA/Logs" -name "*.log" 2>/dev/null | head -3 | xargs tail -80


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 4 — test                                            ║
# ╚═══════════════════════════════════════════════════════════╝
  test:
    name: Run Tests
    runs-on: macos-14
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download xcodeproj
        uses: actions/download-artifact@v4
        with:
          name: xcodeproj
          path: RPGGame.xcodeproj/

      - name: Select Xcode ${{ env.XCODE_VER }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VER }}.app/Contents/Developer

      - name: Pick available simulator
        run: |
          SIM=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json,sys
          devs=json.load(sys.stdin)['devices']
          for rt,dl in devs.items():
              if 'iOS' not in rt: continue
              for d in dl:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['udid']); exit()
          ")
          echo "SIM_ID=$SIM" >> $GITHUB_ENV
          echo "Using simulator: $SIM"

      - name: Run tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
          || echo "⚠️  Tests failed (non-blocking)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ${{ env.DERIVED_DATA }}/*.xcresult
          retention-days: 7
          if-no-files-found: ignore


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 5 — code-quality                                    ║
# ╚═══════════════════════════════════════════════════════════╝
  code-quality:
    name: Code Quality
    runs-on: macos-14
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          brew install swiftlint 2>/dev/null || true
          swiftlint --path RPGGame/ || echo "⚠️  SwiftLint issues (non-blocking)"

      - name: TODO count
        run: grep -rn "TODO\|FIXME" RPGGame/ || echo "(no TODOs)"

      - name: Check build.sh is executable
        run: |
          [ -x build.sh ] && echo "✅  build.sh is executable" \
            || { chmod +x build.sh; echo "✅  Fixed build.sh permissions"; }


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 6 — security-scan                                   ║
# ╚═══════════════════════════════════════════════════════════╝
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep Swift security audit
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/security-audit p/swift"
        continue-on-error: true


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 7 — release                                         ║
# ║  ট্যাগ push করলে GitHub Release + IPA attach করো        ║
# ╚═══════════════════════════════════════════════════════════╝
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: RPGGame-sideload-ipa
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Epic RPG Quest ${{ github.ref_name }}"
          body: |
            ## 📱 Sideload করার পদ্ধতি

            1. **AltStore** → Install IPA → `RPGGame-sideload.ipa`
            2. **Sideloadly** → drag & drop → Apple ID দিন
            3. Device-এ: Settings → General → VPN & Device Management → Trust

            > iOS 15.0+ | Commit: `${{ github.sha }}`
          files: RPGGame-sideload.ipa
          prerelease: ${{ contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ╔═══════════════════════════════════════════════════════════╗
# ║  JOB 8 — summary                                         ║
# ╚═══════════════════════════════════════════════════════════╝
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [ build, test, code-quality ]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## 🎮 Epic RPG Quest — Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | ${{ needs.build.result }}        |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests  | ${{ needs.test.result }}         |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint   | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\` | **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: Slack on failure
        if: needs.build.result == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {"text":"❌ RPG Game build failed on `${{ github.ref_name }}` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|লগ দেখুন>"}
        continue-on-error: true
