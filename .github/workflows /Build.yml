# ============================================================
#  Epic RPG Quest — iOS GitHub Actions CI/CD Pipeline
#  প্রজেক্ট ফাইল:
#    RPGGame/AppDelegate.swift
#    RPGGame/ContentView.swift
#    RPGGame/RPGGame.swift
#    RPGGame/Info.plist
#    RPGGame.xcodeproj/project.pbxproj
#    ExportOptions.plist
#    build.sh
#    README.md
#    SETUP_AND_DEPLOYMENT_GUIDE.md
#    .github/workflows/build.yml  ← এই ফাইল
# ============================================================

name: iOS RPG Game — Build & Sideload IPA

on:
  push:
    branches: [ main, develop ]
    tags:
      - "v*.*.*"          # v1.0.0 ট্যাগ দিলে release তৈরি হবে
  pull_request:
    branches: [ main ]
  workflow_dispatch:       # হাতে চালানোর জন্য

# ── পুরো workflow-এ ব্যবহৃত constant ──────────────────────
env:
  SCHEME:             RPGGame
  PROJECT:            RPGGame.xcodeproj
  BUNDLE_ID:          com.yourcompany.rpggame
  IOS_TARGET:         "15.0"
  XCODE_VERSION:      "15.3"
  DERIVED_DATA:       ${{ github.workspace }}/DerivedData
  ARCHIVE_PATH:       ${{ github.workspace }}/DerivedData/RPGGame.xcarchive
  IPA_DIR:            ${{ github.workspace }}/output/ipa
  SIDELOAD_IPA:       ${{ github.workspace }}/output/RPGGame-sideload.ipa

# ────────────────────────────────────────────────────────────
jobs:

# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 1 — validate                                       ║
# ║  প্রজেক্ট ফাইল ঠিকঠাক আছে কিনা যাচাই                   ║
# ╚══════════════════════════════════════════════════════════╝
  validate:
    name: Validate Project Files
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── ১. সব দরকারি ফাইল আছে কিনা চেক ──────────────────
      - name: Check required files exist
        run: |
          echo "=== প্রজেক্ট ফাইল যাচাই ==="
          required_files=(
            "RPGGame.xcodeproj/project.pbxproj"
            "RPGGame/AppDelegate.swift"
            "RPGGame/ContentView.swift"
            "RPGGame/RPGGame.swift"
            "RPGGame/Info.plist"
            "ExportOptions.plist"
            "build.sh"
          )
          all_ok=true
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅  $f"
            else
              echo "  ❌  $f — পাওয়া যাচ্ছে না!"
              all_ok=false
            fi
          done
          $all_ok || { echo ""; echo "কিছু ফাইল missing! Build বন্ধ।"; exit 1; }

      # ── ২. Info.plist ভ্যালিড XML কিনা ──────────────────
      - name: Validate Info.plist
        run: plutil -lint RPGGame/Info.plist

      # ── ৩. ExportOptions.plist ভ্যালিড কিনা ─────────────
      - name: Validate ExportOptions.plist
        run: plutil -lint ExportOptions.plist

      # ── ৪. Bundle ID মিলছে কিনা ─────────────────────────
      - name: Check bundle ID consistency
        run: |
          PLIST_ID=$(plutil -extract CFBundleIdentifier raw RPGGame/Info.plist)
          echo "Info.plist bundle ID: $PLIST_ID"
          if [ "$PLIST_ID" != "$BUNDLE_ID" ]; then
            echo "⚠️  Bundle ID mismatch: পরিবেশ চলক '$BUNDLE_ID' কিন্তু Info.plist-এ '$PLIST_ID'"
          fi

      # ── ৫. Swift ফাইলে @main একটাই আছে কিনা ────────────
      - name: Check single @main entry point
        run: |
          count=$(grep -rl "@main" RPGGame/ | wc -l | tr -d ' ')
          echo "@main পাওয়া গেছে $count টি ফাইলে"
          [ "$count" -eq 1 ] || { echo "❌  @main একাধিক ফাইলে! Swift compile হবে না।"; exit 1; }

      # ── ৬. Xcode সংস্করণ দেখানো ──────────────────────────
      - name: Show Xcode version
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version
          swift --version


# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 2 — build                                          ║
# ║  Debug + Release build → Archive → Sideload IPA তৈরি   ║
# ╚══════════════════════════════════════════════════════════╝
  build:
    name: Build & Package IPA
    runs-on: macos-14
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      # ── আউটপুট ফোল্ডার তৈরি ────────────────────────────
      - name: Create output directories
        run: mkdir -p "$IPA_DIR" "$DERIVED_DATA"

      # ── Debug build (সবার আগে, দ্রুত ধরা পড়বে) ─────────
      - name: Build — Debug
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=$IOS_TARGET \
            | xcpretty --color || xcodebuild \
              -project "$PROJECT" \
              -scheme  "$SCHEME" \
              -configuration Debug \
              -sdk iphoneos \
              -derivedDataPath "$DERIVED_DATA" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO

      # ── Release build ─────────────────────────────────────
      - name: Build — Release
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=$IOS_TARGET \
            | xcpretty --color || true

      # ── Archive তৈরি ─────────────────────────────────────
      - name: Archive — Release
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=$IOS_TARGET

      # ── Archive থেকে IPA export (ExportOptions.plist ব্যবহার) ──
      - name: Export IPA (ExportOptions.plist)
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$IPA_DIR" \
            -allowProvisioningUpdates \
          || echo "⚠️  Export ব্যর্থ হয়েছে — manual packaging-এ যাচ্ছি"

      # ── Fallback: signing ছাড়াই manual IPA packaging ────
      - name: Package Sideload IPA (unsigned fallback)
        run: |
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            # Archive না হলে DerivedData থেকে খোঁজো
            APP_PATH=$(find "$DERIVED_DATA" -path "*/Release-iphoneos/*.app" | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌  .app bundle পাওয়া যায়নি"; exit 1
          fi

          echo "✅  .app পাওয়া গেছে: $APP_PATH"
          PAYLOAD_DIR="$DERIVED_DATA/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"

          cd "$DERIVED_DATA"
          zip -r -q "$SIDELOAD_IPA" Payload/
          echo "✅  Sideload IPA তৈরি: $SIDELOAD_IPA"
          echo "    আকার: $(du -h "$SIDELOAD_IPA" | cut -f1)"

      # ── Build লগ সংরক্ষণ ─────────────────────────────────
      - name: Save build log on failure
        if: failure()
        run: |
          find "$DERIVED_DATA/Logs" -name "*.log" 2>/dev/null | head -5 | while read f; do
            echo "=== $f ===" && tail -100 "$f"
          done

      # ── Artifact আপলোড ───────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGGame-sideload-ipa
          path: ${{ env.SIDELOAD_IPA }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: RPGGame-xcarchive
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 14
          if-no-files-found: warn


# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 3 — test                                           ║
# ║  Unit tests + Performance tests (Simulator)             ║
# ╚══════════════════════════════════════════════════════════╝
  test:
    name: Run Tests
    runs-on: macos-14
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      # ── iPhone 15 Simulator বেছে নাও ─────────────────────
      - name: Select simulator
        id: sim
        run: |
          SIM_ID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)['devices']
          for runtime,devices in d.items():
              if 'iOS-17' in runtime or 'iOS-16' in runtime:
                  for dev in devices:
                      if 'iPhone 15' in dev['name'] or 'iPhone 14' in dev['name']:
                          print(dev['udid'])
                          exit()
          " 2>/dev/null || echo "")

          if [ -z "$SIM_ID" ]; then
            SIM_ID=$(xcrun simctl list devices available --json \
              | python3 -c "
          import json,sys
          d=json.load(sys.stdin)['devices']
          for rt,devs in d.items():
              for dev in devs:
                  if 'iPhone' in dev['name']:
                      print(dev['udid'])
                      exit()
          ")
          fi
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Simulator: $SIM_ID"

      # ── Unit Tests ────────────────────────────────────────
      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme  "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$DERIVED_DATA/TestResults.xcresult" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
          || echo "⚠️  কিছু test fail করেছে (non-blocking)"

      # ── Test report summary ───────────────────────────────
      - name: Test summary
        if: always()
        run: |
          if [ -d "$DERIVED_DATA/TestResults.xcresult" ]; then
            xcrun xcresulttool get \
              --path "$DERIVED_DATA/TestResults.xcresult" \
              --format json 2>/dev/null \
            | python3 -c "
          import json,sys
          try:
              data=json.load(sys.stdin)
              summary=data.get('metrics',{})
              tests=summary.get('testsCount',{}).get('_value','?')
              failed=summary.get('testsFailedCount',{}).get('_value','0')
              print(f'মোট test: {tests}  |  fail: {failed}')
          except: print('Test result parse করা যায়নি')
          " || true
          fi

      # ── Test result artifact ──────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ${{ env.DERIVED_DATA }}/TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore


# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 4 — code-quality                                   ║
# ║  SwiftLint → SBOM → build.sh permission check           ║
# ╚══════════════════════════════════════════════════════════╝
  code-quality:
    name: Code Quality
    runs-on: macos-14
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── SwiftLint ─────────────────────────────────────────
      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &>/dev/null; then
            swiftlint --config .swiftlint.yml 2>/dev/null \
            || swiftlint --path RPGGame/ \
            || echo "⚠️  SwiftLint সমস্যা পেয়েছে (non-blocking)"
          else
            echo "SwiftLint install হয়নি, skip"
          fi

      # ── build.sh executable কিনা ────────────────────────
      - name: Check build.sh is executable
        run: |
          if [ ! -x build.sh ]; then
            echo "⚠️  build.sh executable না — ঠিক করছি..."
            chmod +x build.sh
          else
            echo "✅  build.sh executable"
          fi

      # ── Swift ফাইলে TODO/FIXME গণনা ─────────────────────
      - name: Count TODOs
        run: |
          echo "=== TODO / FIXME count ==="
          grep -rn "TODO\|FIXME\|HACK\|XXX" RPGGame/ || echo "(কোনো TODO নেই)"

      # ── Dependency list (SBOM lightweight) ───────────────
      - name: Generate dependency list
        run: |
          echo "=== Swift source files ===" > sbom-lite.txt
          find RPGGame/ -name "*.swift" >> sbom-lite.txt
          echo "" >> sbom-lite.txt
          echo "=== Plists ===" >> sbom-lite.txt
          find . -name "*.plist" -not -path "*/DerivedData/*" >> sbom-lite.txt
          cat sbom-lite.txt

      - name: Upload dependency list
        uses: actions/upload-artifact@v4
        with:
          name: sbom-lite
          path: sbom-lite.txt
          retention-days: 30


# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 5 — security-scan                                  ║
# ║  Semgrep দিয়ে Swift security audit                      ║
# ╚══════════════════════════════════════════════════════════╝
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep (Swift security rules)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/swift
        continue-on-error: true    # scan fail হলেও build থামবে না

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true


# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 6 — sideload-guide                                 ║
# ║  IPA download করার instruction তৈরি ও Release-এ দেওয়া ║
# ╚══════════════════════════════════════════════════════════╝
  sideload-guide:
    name: Generate Sideload Guide
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: RPGGame-sideload-ipa
          path: ./artifacts/

      - name: Generate sideload instruction markdown
        run: |
          IPA_SIZE=$(du -h artifacts/RPGGame-sideload.ipa 2>/dev/null | cut -f1 || echo "N/A")
          cat > SIDELOAD_INSTRUCTIONS.md << EOF
          # 📱 Epic RPG Quest — Sideload Installation Guide

          **Build:** ${{ github.run_number }}
          **Commit:** \`${{ github.sha }}\`
          **IPA Size:** ${IPA_SIZE}

          ---

          ## পদ্ধতি ১ — AltStore (সবচেয়ে সহজ, free Apple ID)

          1. [AltStore](https://altstore.io/) Mac-এ ইনস্টল করুন
          2. iPhone USB দিয়ে connect করুন
          3. AltStore খুলুন → **Install IPA** → \`RPGGame-sideload.ipa\` বেছে নিন
          4. Apple ID দিয়ে সাইন ইন করুন (free account যথেষ্ট)
          5. iPhone-এ: **Settings → General → VPN & Device Management** → Developer trust করুন
          6. Home screen থেকে অ্যাপ চালু করুন 🎮

          > ⚠️ সার্টিফিকেট ৭ দিন পর expire হয়। AltStore Wi-Fi-তে থাকলে auto-renew করে।

          ---

          ## পদ্ধতি ২ — Sideloadly

          1. [Sideloadly](https://sideloadly.io/) ডাউনলোড করুন
          2. iPhone connect করুন
          3. IPA ফাইল drag & drop করুন
          4. Apple ID দিন → **Start**
          5. Device-এ trust করুন

          ---

          ## পদ্ধতি ৩ — Source থেকে Build

          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git
          cd $(basename ${{ github.repository }})
          chmod +x build.sh
          ./build.sh --release --sideload
          # IPA: DerivedData/RPGGame-sideload.ipa
          \`\`\`

          ---

          ## System Requirements
          - iOS 15.0+
          - iPhone 6s বা তার পরের মডেল
          - ~100MB খালি জায়গা
          EOF
          echo "Guide তৈরি হয়েছে"

      - name: Upload sideload guide
        uses: actions/upload-artifact@v4
        with:
          name: sideload-instructions
          path: SIDELOAD_INSTRUCTIONS.md

      # ── ট্যাগ push করলে GitHub Release তৈরি করো ─────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Epic RPG Quest ${{ github.ref_name }}"
          body_path: SIDELOAD_INSTRUCTIONS.md
          files: |
            artifacts/RPGGame-sideload.ipa
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ╔══════════════════════════════════════════════════════════╗
# ║  JOB 7 — notify                                         ║
# ║  Build সম্পূর্ণ হলে Slack/বা summary দেখাও             ║
# ╚══════════════════════════════════════════════════════════╝
  notify:
    name: Notify & Summary
    runs-on: ubuntu-latest
    needs: [ build, test, code-quality ]
    if: always()

    steps:
      - name: Build summary
        run: |
          echo "## 🎮 Epic RPG Quest Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      # ── Slack notification (optional, secret থাকলে কাজ করবে) ─
      - name: Slack notification on failure
        if: |
          failure() &&
          needs.build.result == 'failure' &&
          secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ RPG Game Build Failed",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Build Failed*\nRepo: ${{ github.repository }}\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|লগ দেখুন>"
                }
              }]
            }
