name: iOS RPG Game Build & Sideload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  RUBY_VERSION: "3.2"
  IOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.3.app/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: |
          if [ -f Podfile ]; then
            pod install
          fi

      - name: Build for iOS (Debug)
        run: |
          xcodebuild \
            -scheme RPGGame \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath .build \
            -verbose \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for iOS (Release)
        run: |
          xcodebuild \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath .build \
            -verbose \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Sideload IPA
        run: |
          mkdir -p artifacts
          # সাব-ফোল্ডার বা মেইন ফোল্ডার যেখানেই হোক না কেন .app ফাইলটি খুঁজে বের করবে
          APP_PATH=$(find . -name "RPGGame.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: RPGGame.app file not found!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q artifacts/RPGGame-sideload.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-artifacts
          path: artifacts/RPGGame-sideload.ipa

      - name: Generate Sideload Instructions
        run: |
          cat << 'EOF' > SIDELOAD_INSTRUCTIONS.md
          # 🎮 Epic RPG Quest - Sideloading Instructions
          
          This IPA has been compiled automatically via GitHub Actions without requiring an Apple Developer Account.
          
          ## How to Install on your iOS Device
          
          ### Method 1: AltStore (Recommended)
          1. Download and install AltServer on your PC/Mac from https://altstore.io/
          2. Connect your iPhone to your computer via cable.
          3. Install AltStore to your phone.
          4. Download the `RPGGame-sideload.ipa` artifact from this run to your phone.
          5. Open AltStore, go to "My Apps", click the "+" icon, and select the `.ipa` file.
          
          ### Method 2: Sideloadly
          1. Download Sideloadly from https://sideloadly.io/
          2. Connect your iOS device to your PC/Mac.
          3. Drag and drop the `RPGGame-sideload.ipa` into Sideloadly.
          4. Enter your Apple ID (free account works).
          5. Select your device and click "Start".
          6. Trust the developer on your device (Settings > General > VPN & Device Management).
          
          Enjoy the game! 🎮
          EOF

      - name: Upload Instructions
        uses: actions/upload-artifact@v4
        with:
          name: sideload-instructions
          path: SIDELOAD_INSTRUCTIONS.md

      - name: Create GitHub Release with Instructions
        id: create_release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body_path: SIDELOAD_INSTRUCTIONS.md
          draft: false
          prerelease: false

      - name: Upload Asset to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/RPGGame-sideload.ipa
          asset_name: RPGGame-sideload.ipa
          asset_content_type: application/octet-stream
