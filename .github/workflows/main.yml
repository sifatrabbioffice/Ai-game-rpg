name: iOS RPG Game Build & Sideload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  RUBY_VERSION: "3.2"
  IOS_DEPLOYMENT_TARGET: "15.0"
  DEVELOPER_DIR: /Applications/Xcode_15.3.app/Contents/Developer

jobs:
  build:
    name: Build & Archive iOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Verify Xcode Toolchain
        run: xcodebuild -version

      - name: Install Dependencies
        run: |
          if [ -f Podfile ]; then
            pod install
          fi

      - name: Compile Unit & Integration Tests (Debug)
        run: |
          xcodebuild \
            -workspace RPGGame.xcodeproj \
            -scheme RPGGame \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            clean build-for-testing

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -scheme RPGGame \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            test-without-building \
            -verbose

      - name: Build & Archive Release Package
        run: |
          xcodebuild \
            -project ios/RPGGame.xcodeproj \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/RPGGame.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean archive

      - name: Create Production IPA from Archive
        run: |
          if [ -f ExportOptions.plist ]; then
            xcodebuild \
              -exportArchive \
              -archivePath build/RPGGame.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build/ipa
          else
            echo "⚠️ ExportOptions.plist not found. Executing fallback payload wrapper."
            mkdir -p build/ipa/Payload
            cp -r build/RPGGame.xcarchive/Products/Applications/*.app build/ipa/Payload/
            cd build/ipa
            zip -r -q RPGGame-sideload.ipa Payload/
          fi

      - name: Generate Test Report Summary
        if: always()
        run: |
          if [ -d build/Logs/Test ]; then
            echo "## Test Suite Execution Metadata" >> $GITHUB_STEP_SUMMARY
            find build/Logs/Test -name "*.xcresult" -exec echo "Artifact generated: {}" \; >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Core Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-artifacts
          path: |
            build/RPGGame.xcarchive
            build/ipa/RPGGame-sideload.ipa
          retention-days: 30

  code-analysis:
    name: Code Quality & Analysis
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize Quality Environment
        run: brew install swiftlint

      - name: Run Static Analysis (SwiftLint)
        run: swiftlint --reporter github

  security-scan:
    name: Static Application Security Testing (SAST)
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/swift
          generateSarif: true

      - name: Expose Vulnerability Metrics
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  performance-test:
    name: Automated Performance Validation
    runs-on: macos-14
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Profiling Metrics
        run: |
          xcodebuild \
            -project ios/RPGGame.xcodeproj \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            test \
            -only-testing RPGGameTests/PerformanceTests \
            -verbose || true

  sideload-guide:
    name: Deployment Documentation Assembly
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Fetch Pipeline Output
        uses: actions/download-artifact@v4
        with:
          name: iOS-build-artifacts
          path: ./

      - name: Generate Markdown Blueprint
        run: |
          cat > SIDELOAD_INSTRUCTIONS.md << 'EOF'
          # iOS RPG Game - Sideload Installation Guide
          ## Deployment Paths
          * **Method 1: AltStore** — Managed client certificate loading.
          * **Method 2: Sideloadly** — Direct signature injection using localized Apple ID profiles.
          EOF

      - name: Archive Instructions
        uses: actions/upload-artifact@v4
        with:
          name: sideload-instructions
          path: SIDELOAD_INSTRUCTIONS.md
