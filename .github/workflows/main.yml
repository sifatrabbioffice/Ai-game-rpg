name: iOS RPG Game Build & Sideload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  RUBY_VERSION: "3.2"
  IOS_DEPLOYMENT_TARGET: "15.0"
  PROJECT_PATH: "RPGGame/RPGGame.xcodeproj"

jobs:
  validation-and-analysis:
    name: Code Quality & Security
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict || echo "Lint issues found, continuing..."

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/swift
          generateSarif: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  test-and-build:
    name: Test & Compile App
    runs-on: macos-14
    needs: validation-and-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Select Xcode Version
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Install Dependencies
        run: |
          if [ -f Podfile ]; then
            pod install
          fi

      - name: Run Unit & Performance Tests
        run: |
          xcodebuild \
            -project ${{ env.PROJECT_PATH }} \
            -scheme RPGGame \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            test \
            -verbose

      - name: Build Unsigned Release Binary
        run: |
          xcodebuild \
            -project ${{ env.PROJECT_PATH }} \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package IPA for Sideloading
        run: |
          mkdir -p build/ipa/Payload
          CP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          if [ -z "$CP_PATH" ]; then
            echo "Error: RPGGame.app bundle not found." && exit 1
          fi
          cp -R "$CP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r -y -q ../RPGGame-sideload.ipa Payload/
          cd ../..

      - name: Generate SBOM
        run: |
          xcodebuild \
            -project ${{ env.PROJECT_PATH }} \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -showBuildSettings -json > sbom.json || echo "{}" > sbom.json

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-release-artifacts
          path: |
            build/RPGGame-sideload.ipa
            sbom.json
          retention-days: 14

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ iOS RPG Game Build Failed. Commit: ${{ github.sha }}"
            }

  distribution:
    name: Documentation & Release
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: iOS-release-artifacts
          path: ./artifacts

      - name: Generate Documentation
        run: |
          cat > SIDELOAD_INSTRUCTIONS.md << 'EOF'
          # iOS RPG Game - Sideload Installation Guide
          
          ## Method 1: Using AltStore (Recommended)
          1. Download and install [AltStore](https://altstore.io/) on your computer.
          2. Connect your iPhone to your machine.
          3. Copy the downloaded `RPGGame-sideload.ipa` to your device.
          4. Open AltStore on your device, navigate to "My Apps", tap the "+" icon, and select the IPA file.
          5. Go to `Settings > General > VPN & Device Management` on your iOS device to trust your developer certificate.
          
          ## Method 2: Using Sideloadly
          1. Download [Sideloadly](https://sideloadly.io/).
          2. Connect your iOS device via USB.
          3. Drag and drop the `RPGGame-sideload.ipa` file directly into the application window.
          4. Enter your Apple ID to sign the package and click "Start".
          
          ## Requirements
          - iOS 15.0 or later
          - 200MB available storage space
          EOF

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/RPGGame-sideload.ipa
          body_path: SIDELOAD_INSTRUCTIONS.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
