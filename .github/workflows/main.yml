name: iOS RPG Game Build & Sideload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  RUBY_VERSION: "3.2"
  IOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.3.app/Contents/Developer
          xcodebuild -version

      - name: Build for iOS (Release)
        run: |
          echo "🔍 Searching for RPGGame.xcodeproj..."
          # মেইন ফোল্ডার বা সাব-ফোল্ডার যেখানেই হোক .xcodeproj এর সঠিক পাথ খুঁজে বের করবে
          PROJECT_PATH=$(find . -name "RPGGame.xcodeproj" -type d | head -n 1)
          
          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ Error: RPGGame.xcodeproj could not be found anywhere in the repository!"
            echo "Please ensure you have committed the actual .xcodeproj bundle."
            exit 1
          fi
          
          echo "✅ Found project at: $PROJECT_PATH"
          
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath .build \
            -verbose \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create Sideload IPA
        run: |
          mkdir -p artifacts
          APP_PATH=$(find .build/Build/Products/Release-iphoneos -name "RPGGame.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ Error: RPGGame.app not found in build directory!"
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -q artifacts/RPGGame-sideload.ipa Payload
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-artifacts
          path: artifacts/RPGGame-sideload.ipa
