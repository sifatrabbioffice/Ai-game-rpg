name: iOS RPG Game Build & Sideload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  RUBY_VERSION: "3.2"
  IOS_DEPLOYMENT_TARGET: "15.0"

jobs:
  analyze-and-scan:
    name: Code Analysis & Security
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint || echo "SwiftLint found warnings."

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/swift
          generateSarif: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  build-and-test:
    name: Test & Build App
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Install dependencies
        run: |
          if [ -f Podfile ]; then
            pod install
          fi

      - name: Run Unit & Performance Tests
        run: |
          xcodebuild \
            -scheme RPGGame \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            test \
            -verbose

      - name: Build Unsigned Release Executable
        run: |
          xcodebuild \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package IPA for Sideloading
        run: |
          mkdir -p build/ipa/Payload
          # Locate the compiled .app bundle dynamically
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: RPGGame.app bundle not found." && exit 1
          fi
          cp -R "$APP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r -y -q ../RPGGame-sideload.ipa Payload/
          cd ../..

      - name: Generate Basic Dependency List
        run: |
          echo '{"frameworks": "Inferred from Xcode project structures"}' > sbom.json

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-build-artifacts
          path: |
            build/RPGGame-sideload.ipa
            sbom.json
          retention-days: 14

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ *iOS RPG Game Build Failed*\nCommit: ${{ github.sha }}"
            }

  sideload-guide:
    name: Generate Sideload Instructions
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: iOS-build-artifacts
          path: ./artifacts

      - name: Generate Instructions
        run: |
          cat > SIDELOAD_INSTRUCTIONS.md << 'EOF'
          # iOS RPG Game - Sideload Installation Guide
          
          ## Method 1: Using AltStore (Recommended)
          1. Download and install [AltStore](https://altstore.io/) on your computer.
          2. Connect your iPhone to your machine.
          3. Copy `RPGGame-sideload.ipa` over to your device.
          4. Open AltStore on your device, tap the "+" icon under "My Apps", and select the IPA file.
          5. Trust your Apple ID profile under `Settings > General > VPN & Device Management`.
          
          ## Method 2: Using Sideloadly
          1. Open [Sideloadly](https://sideloadly.io/).
          2. Drag and drop the `RPGGame-sideload.ipa` file into the utility window.
          3. Enter your Apple ID and click "Start" to push it to your connected device.
          EOF

      - name: Create Clean GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/RPGGame-sideload.ipa
          body_path: SIDELOAD_INSTRUCTIONS.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
