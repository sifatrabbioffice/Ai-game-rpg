name: iOS RPG Game Build & Sideload

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.3"
  RUBY_VERSION: "3.2"
  IOS_DEPLOYMENT_TARGET: "15.0"
  # Set to "." if the xcodeproj is located directly at the root of the repository
  PROJECT_PATH: "RPGGame.xcodeproj"

jobs:
  static-analysis:
    name: Security & Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/security-audit
            p/swift

  test-and-build:
    name: Test & Compile App
    runs-on: macos-14
    needs: static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Select Xcode Version
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Run SwiftLint Linter
        run: |
          brew install swiftlint
          swiftlint --strict || echo "Linting warnings found, continuing build pipeline..."

      - name: Run Unit & Performance Tests
        run: |
          xcodebuild \
            -project ${{ env.PROJECT_PATH }} \
            -scheme RPGGame \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            test \
            -verbose

      - name: Build Unsigned Release Binary
        run: |
          xcodebuild \
            -project ${{ env.PROJECT_PATH }} \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package IPA for Sideloading
        run: |
          mkdir -p build/ipa/Payload
          CP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          if [ -z "$CP_PATH" ]; then
            echo "Error: Application bundle (.app) could not be located." && exit 1
          fi
          cp -R "$CP_PATH" build/ipa/Payload/
          cd build/ipa
          zip -r -y -q ../RPGGame-sideload.ipa Payload/
          cd ../..

      - name: Generate Software Bill of Materials (SBOM)
        run: |
          xcodebuild \
            -project ${{ env.PROJECT_PATH }} \
            -scheme RPGGame \
            -configuration Release \
            -sdk iphoneos \
            -showBuildSettings -json > sbom.json || echo "{}" > sbom.json

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iOS-release-artifacts
          path: |
            build/RPGGame-sideload.ipa
            sbom.json
          retention-days: 14

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ iOS RPG Game Build Failed. Commit ID: ${{ github.sha }}"
            }

  distribution:
    name: Documentation & Release Execution
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Download Compiled Artifacts
        uses: actions/download-artifact@v4
        with:
          name: iOS-release-artifacts
          path: ./artifacts

      - name: Generate Sideloading Instructions Document
        run: |
          cat > SIDELOAD_INSTRUCTIONS.md << 'EOF'
          # iOS RPG Game - Sideload Installation Guide
          
          ## Method 1: Using AltStore (Recommended)
          1. Download and install [AltStore](https://altstore.io/) on your computer.
          2. Connect your iOS device to your local machine.
          3. Transfer the downloaded `RPGGame-sideload.ipa` archive to your device file storage.
          4. Open AltStore on your device, navigate to the "My Apps" management tab, tap the "+" icon, and import the package.
          5. Navigate to `Settings > General > VPN & Device Management` on your physical device to explicitly trust your development certificate authority.
          
          ## Method 2: Using Sideloadly
          1. Download and open [Sideloadly](https://sideloadly.io/).
          2. Connect your iOS device via USB interface.
          3. Drag and drop the `RPGGame-sideload.ipa` asset into the application UI frame.
          4. Provide your active Apple ID credentials to locally sign the binary package and select "Start".
          
          ## System Prerequisites
          - iOS 15.0 or higher
          - 200MB minimum available workspace capacity
          EOF

      - name: Publish Production GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/RPGGame-sideload.ipa
          body_path: SIDELOAD_INSTRUCTIONS.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
